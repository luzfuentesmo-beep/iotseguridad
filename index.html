<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Alarma</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 1.8rem; font-weight: bold; color: #333; border-left: 8px solid #1e88e5; text-align: center; max-width: 90%; }
        #lblEstado { color: #0d47a1; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        Estado del Sistema: 
        <span id="lblEstado">Cargando...</span>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Configuración de tu base de datos
    const firebaseConfig = {
        databaseURL: "https://alarma-de-seguridad-3a2f8-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Escucha en tiempo real el nodo de la notificación
    onValue(ref(db, '/notificacion'), (snapshot) => {
        document.getElementById('lblEstado').innerText = snapshot.val() || "Sin datos";
    });
</script>
</body>
</html>
